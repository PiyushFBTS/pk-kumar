name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Dummy values so env validation + build pass without a real DB.
      DATABASE_URL: "mysql://ci:ci@localhost:3306/ci"
      JWT_SECRET: "ci-access-secret"
      JWT_REFRESH_SECRET: "ci-refresh-secret"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run db:generate
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build
